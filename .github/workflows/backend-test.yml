name: Backend Tests

on:
  push:
    paths:
      - "progetto/api/**"
      - "progetto/docker-compose.yml"
      - ".github/workflows/backend-test.yml"
  workflow_dispatch:
  workflow_call:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 23
          cache: maven

      - name: Run tests with coverage
        working-directory: progetto/api
        run: ./mvnw verify -B

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: progetto/api/target/site/jacoco/
