name: PR Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend:
    name: Backend Tests
    uses: ./.github/workflows/backend-test.yml
    secrets: inherit

  frontend:
    name: Frontend Checks
    uses: ./.github/workflows/frontend-test.yml
    secrets: inherit

  bruno:
    name: Bruno API Tests
    uses: ./.github/workflows/bruno-test.yml
    secrets: inherit

  gate:
    name: PR Gate
    runs-on: ubuntu-latest
    needs: [backend, frontend, bruno]
    if: always()

    steps:
      - name: Check all suites passed
        run: |
          if [ "${{ needs.backend.result }}" != "success" ] || \
             [ "${{ needs.frontend.result }}" != "success" ] || \
             [ "${{ needs.bruno.result }}" != "success" ]; then
            echo "One or more test suites failed:"
            echo "  Backend:  ${{ needs.backend.result }}"
            echo "  Frontend: ${{ needs.frontend.result }}"
            echo "  Bruno:    ${{ needs.bruno.result }}"
            exit 1
          fi
          echo "All test suites passed."
