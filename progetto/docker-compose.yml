services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - bugboard_net

  api:
    build: ./api
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    env_file: .env
    volumes:
      - uploads:/app/uploads
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      JWT_SECRET: ${JWT_SECRET}
      BUGBOARD_CORS_ALLOWED_ORIGINS: ${BUGBOARD_CORS_ALLOWED_ORIGINS:-http://localhost:5173,https://localhost}
      BUGBOARD_ATTACHMENTS_DIR: /app/uploads
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/auth/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - bugboard_net

  web:
    build: ./web
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    ports:
      - "5173:5173"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:5173 > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - bugboard_net

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    profiles:
      - proxy
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --no-check-certificate -O - https://localhost > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    networks:
      - bugboard_net

volumes:
  pgdata:
  uploads:

networks:
  bugboard_net:
    driver: bridge
