services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - bugboard_net

  api:
    image: ${API_IMAGE:?API_IMAGE must be set}
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    env_file: .env
    volumes:
      - uploads:/app/uploads
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: ${JWT_SECRET}
      BUGBOARD_CORS_ALLOWED_ORIGINS: https://${SERVER_NAME:-localhost}
      BUGBOARD_ATTACHMENTS_DIR: /app/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/auth/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - bugboard_net

  web:
    image: ${WEB_IMAGE:?WEB_IMAGE must be set}
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    environment:
      NGINX_SERVER_NAME: ${SERVER_NAME:-localhost}
      NGINX_SSL_CERT_PATH: ${NGINX_SSL_CERT_PATH:-/etc/nginx/certs/fullchain.pem}
      NGINX_SSL_KEY_PATH: ${NGINX_SSL_KEY_PATH:-/etc/nginx/certs/privkey.pem}
    volumes:
      - ./nginx/prod.conf:/etc/nginx/templates/default.conf.template:ro
      - ${SSL_CERTS_HOST_PATH:-./nginx/certs}:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --no-check-certificate -O - https://localhost > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - bugboard_net

volumes:
  pgdata:
  uploads:

networks:
  bugboard_net:
    driver: bridge
